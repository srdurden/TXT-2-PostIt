<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TXT 2 Post-It</title>
  <style>
    :root {
      --bg: #f3f4f8;
      --panel: #ebecef;
      --shadow: 0 4px 14px rgba(27, 35, 50, 0.14);
      --radius: 16px;
      --blue: #2f78d6;
      --danger: #df3d3d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: #1f2733;
    }

    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: #f0f1f5;
      border-right: 1px solid #dadde4;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 18px;
      gap: 26px;
    }

    .sidebar-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #9ca7b9;
    }

    .add-card {
      width: 152px;
      border-radius: 22px;
      background: #e9ebf1;
      box-shadow: inset 0 1px 0 #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 18px 10px;
    }

    .add-btn {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: 2px solid #4c5260;
      background: linear-gradient(#24262c, #15171b);
      color: white;
      font-size: 52px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 7px 14px rgba(0,0,0,.25);
    }

    .add-text {
      text-align: center;
      font-size: 38px;
      line-height: 1.05;
      font-weight: 650;
      transform: scale(.45);
      transform-origin: top center;
      margin-top: -22px;
      margin-bottom: -22px;
    }

    .palette-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      opacity: .9;
    }

    .main {
      padding: 26px 30px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      border: 1px solid #d3d9e1;
      background: #f3f4f7;
      border-radius: 14px;
      padding: 14px 16px 14px 52px;
      font-size: 36px;
      transform: scale(.45);
      transform-origin: left center;
      height: 52px;
      color: #3a4453;
    }

    .search .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      opacity: .6;
    }

    .settings {
      border: none;
      background: linear-gradient(#4f9ae4, #2c72c9);
      color: #fff;
      border-radius: 10px;
      font-size: 30px;
      padding: 12px 18px;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .notes {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .note {
      border-radius: 14px;
      box-shadow: 0 3px 10px rgba(31,39,51,0.12);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.06);
    }

    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      font-weight: 700;
      font-size: 18px;
    }

    .note-body-wrap {
      display: grid;
      grid-template-columns: 1fr 66px;
      align-items: stretch;
    }

    .note-body {
      padding: 14px 18px;
      min-height: 80px;
      outline: none;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 18px;
      line-height: 1.45;
    }

    .side-actions {
      border-left: 1px solid rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: rgba(255,255,255,0.3);
    }

    button.small {
      border: none;
      cursor: pointer;
      border-radius: 8px;
      font-weight: 600;
      box-shadow: 0 2px 5px rgba(0,0,0,.2);
    }

    .copy-btn {
      background: linear-gradient(#4c8de0, #2f70cf);
      color: #fff;
      padding: 9px 14px;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .danger {
      background: linear-gradient(#ff6767, #dd2f2f);
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      font-size: 22px;
    }

    .move {
      width: 40px;
      height: 40px;
      font-size: 20px;
      background: #eceff4;
      color: #5d6a7e;
    }

    .empty {
      text-align: center;
      padding: 36px;
      border: 2px dashed #cfd6e2;
      border-radius: 14px;
      color: #667489;
      background: #f6f8fc;
    }

    @media (max-width: 950px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        flex-direction: row;
        justify-content: center;
        border-right: none;
        border-bottom: 1px solid #dadde4;
      }
      .sidebar-dot, .palette-dot { display: none; }
      .add-card { width: 200px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-dot"></div>
      <div class="add-card">
        <button class="add-btn" id="loadButton" aria-label="Cargar notas">+</button>
        <div class="add-text">Añadir<br />nueva nota</div>
      </div>
      <div class="palette-dot" style="background:#efb443"></div>
      <div class="palette-dot" style="background:#f0b16f"></div>
      <div class="palette-dot" style="background:#6ac1ca"></div>
      <div class="palette-dot" style="background:#b8cf74"></div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <label class="search">
          <span class="icon">🔍</span>
          <input id="searchInput" type="search" placeholder="Buscar..." />
        </label>
        <button class="settings" aria-label="Ajustes">⚙️</button>
      </div>

      <section id="notes" class="notes"></section>
      <input id="fileInput" type="file" accept=".txt,text/plain" multiple hidden />
    </main>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const loadButton = document.getElementById('loadButton');
    const searchInput = document.getElementById('searchInput');
    const notesContainer = document.getElementById('notes');

    const noteColors = [
      { header: '#f6ebc7', body: '#fdf7e8' },
      { header: '#deebd9', body: '#eff8ec' },
      { header: '#f4d8d3', body: '#fdeeed' },
      { header: '#d7e4f7', body: '#edf3ff' },
      { header: '#ece0f6', body: '#f7f0ff' }
    ];

    let notes = [];

    loadButton.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', handleFiles);
    searchInput.addEventListener('input', renderNotes);

    async function handleFiles(event) {
      const files = Array.from(event.target.files || []).filter(file => file.name.toLowerCase().endsWith('.txt'));
      if (!files.length) return;

      const loaded = await Promise.all(files.map(async (file) => {
        const content = await file.text();
        const clean = content.replace(/\r\n/g, '\n').trim();
        return {
          id: crypto.randomUUID(),
          title: file.name.replace(/\.txt$/i, '') || 'Nota sin título',
          content: clean || '(Archivo vacío)',
          createdAt: Date.now()
        };
      }));

      notes = notes.concat(loaded);
      event.target.value = '';
      renderNotes();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function moveNote(id, direction) {
      const index = notes.findIndex(n => n.id === id);
      if (index < 0) return;
      const target = direction === 'up' ? index - 1 : index + 1;
      if (target < 0 || target >= notes.length) return;
      [notes[index], notes[target]] = [notes[target], notes[index]];
      renderNotes();
    }

    async function copyNote(id) {
      const note = notes.find(n => n.id === id);
      if (!note) return;
      try {
        await navigator.clipboard.writeText(note.content);
      } catch {
        const temp = document.createElement('textarea');
        temp.value = note.content;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        temp.remove();
      }
    }

    function deleteNote(id) {
      notes = notes.filter(n => n.id !== id);
      renderNotes();
    }

    function updateNote(id, value) {
      const note = notes.find(n => n.id === id);
      if (!note) return;
      note.content = value;
    }

    notesContainer.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const { action, id } = button.dataset;

      if (action === 'up') moveNote(id, 'up');
      if (action === 'down') moveNote(id, 'down');
      if (action === 'copy') copyNote(id);
      if (action === 'delete') deleteNote(id);
    });

    notesContainer.addEventListener('input', (event) => {
      const editor = event.target.closest('[data-editor-id]');
      if (!editor) return;
      updateNote(editor.dataset.editorId, editor.innerText);
    });

    function renderNotes() {
      const term = searchInput.value.trim().toLowerCase();
      const filtered = term
        ? notes.filter(note => (`${note.title}\n${note.content}`).toLowerCase().includes(term))
        : notes;

      if (!filtered.length) {
        notesContainer.innerHTML = `<div class="empty">No hay notas que coincidan con la búsqueda.</div>`;
        return;
      }

      notesContainer.innerHTML = filtered.map((note, i) => {
        const color = noteColors[i % noteColors.length];
        return `
          <article class="note" style="background:${color.body}">
            <header class="note-header" style="background:${color.header}">
              <span>${escapeHtml(note.title)}</span>
              <div>
                <button class="small copy-btn" data-action="copy" data-id="${note.id}">📋 Copiar</button>
                <button class="small danger" data-action="delete" data-id="${note.id}" aria-label="Borrar">✖</button>
              </div>
            </header>
            <div class="note-body-wrap">
              <div class="note-body" contenteditable="true" data-editor-id="${note.id}">${escapeHtml(note.content)}</div>
              <div class="side-actions">
                <button class="small move" data-action="up" data-id="${note.id}" aria-label="Subir">⬆</button>
                <button class="small move" data-action="down" data-id="${note.id}" aria-label="Bajar">⬇</button>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    renderNotes();
  </script>
</body>
</html>
