<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TXT 2 Post-It</title>
  <style>
    :root {
      --bg: #f3f4f8;
      --panel: #ebecef;
      --shadow: 0 4px 14px rgba(27, 35, 50, 0.14);
      --radius: 16px;
      --blue: #2f78d6;
      --danger: #df3d3d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: #1f2733;
    }

    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: #f0f1f5;
      border-right: 1px solid #dadde4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 18px 18px 24px;
      gap: 18px;
    }

    .add-btn {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 1px solid #202226;
      background: linear-gradient(#24262c, #15171b);
      color: white;
      font-size: 34px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 7px 14px rgba(0,0,0,.25);
      z-index: 3;
    }

    .palette-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      opacity: .9;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,.25);
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .palette-dot:hover {
      transform: scale(1.12);
      box-shadow: 0 4px 9px rgba(0,0,0,.3);
    }

    .palette-nav {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .main {
      padding: 26px 30px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      margin-bottom: 24px;
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      border: 2px solid #2f78d6;
      background: #f8fbff;
      border-radius: 14px;
      padding: 14px 16px 14px 52px;
      font-size: 36px;
      transform: scale(.45);
      transform-origin: left center;
      height: 52px;
      color: #3a4453;
      box-shadow: 0 0 0 3px rgba(47, 120, 214, .12);
      transition: box-shadow .15s ease, border-color .15s ease;
    }

    .search input:focus {
      outline: none;
      border-color: #1f64bb;
      box-shadow: 0 0 0 4px rgba(47, 120, 214, .2);
    }

    .search .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      opacity: .6;
    }

    .notes {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .note {
      border-radius: 14px;
      box-shadow: 0 3px 10px rgba(31,39,51,0.12);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.06);
    }

    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      font-weight: 700;
      font-size: 18px;
    }

    .note-body-wrap {
      display: grid;
      grid-template-columns: 1fr 66px;
      align-items: stretch;
    }

    .note-body {
      padding: 14px 18px;
      min-height: 80px;
      outline: none;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 18px;
      line-height: 1.45;
    }

    .side-actions {
      border-left: 1px solid rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: rgba(255,255,255,0.3);
    }

    button.small {
      border: none;
      cursor: pointer;
      border-radius: 8px;
      font-weight: 600;
      box-shadow: 0 2px 5px rgba(0,0,0,.2);
    }

    .copy-btn {
      background: linear-gradient(#4c8de0, #2f70cf);
      color: #fff;
      width: 40px;
      height: 40px;
      padding: 0;
      font-size: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .copy-btn.copied {
      background: linear-gradient(#40b06a, #2f8f54);
    }

    .copy-btn.copied::after {
      content: "✓";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,.1);
      border-radius: 8px;
      animation: copiedFlash .5s ease;
    }

    @keyframes copiedFlash {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .danger {
      background: linear-gradient(#ff6767, #dd2f2f);
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      font-size: 22px;
    }

    .move {
      width: 40px;
      height: 40px;
      font-size: 20px;
      background: #eceff4;
      color: #5d6a7e;
    }

    .empty {
      text-align: center;
      padding: 36px;
      border: 2px dashed #cfd6e2;
      border-radius: 14px;
      color: #667489;
      background: #f6f8fc;
    }

    @media (max-width: 950px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
        flex-direction: row;
        justify-content: center;
        border-right: none;
        border-bottom: 1px solid #dadde4;
      }
      .palette-nav {
        flex-direction: row;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <button class="add-btn" id="loadButton" aria-label="Añadir notas">+</button>
      <nav id="paletteNav" class="palette-nav" aria-label="Ir a notas por color"></nav>
    </aside>

    <main class="main">
      <div class="toolbar">
        <label class="search">
          <span class="icon">🔍</span>
          <input id="searchInput" type="search" placeholder="Buscar..." />
        </label>
      </div>

      <section id="notes" class="notes"></section>
      <input id="fileInput" type="file" accept=".txt,text/plain" multiple hidden />
    </main>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const loadButton = document.getElementById('loadButton');
    const searchInput = document.getElementById('searchInput');
    const notesContainer = document.getElementById('notes');
    const paletteNav = document.getElementById('paletteNav');

    const noteColors = [
      { header: '#f6ebc7', body: '#fdf7e8' },
      { header: '#deebd9', body: '#eff8ec' },
      { header: '#f4d8d3', body: '#fdeeed' },
      { header: '#d7e4f7', body: '#edf3ff' },
      { header: '#ece0f6', body: '#f7f0ff' }
    ];

    let notes = [];

    loadButton.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', handleFiles);
    searchInput.addEventListener('input', renderNotes);

    async function handleFiles(event) {
      const files = Array.from(event.target.files || []).filter(file => file.name.toLowerCase().endsWith('.txt'));
      if (!files.length) return;

      const loaded = await Promise.all(files.map(async (file, index) => {
        const content = await file.text();
        const clean = content.replace(/\r\n/g, '\n').trim();
        return {
          id: crypto.randomUUID(),
          title: file.name.replace(/\.txt$/i, '') || 'Nota sin título',
          content: clean || '(Archivo vacío)',
          createdAt: Date.now(),
          colorIndex: (notes.length + index) % noteColors.length
        };
      }));

      notes = notes.concat(loaded);
      event.target.value = '';
      renderNotes();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function moveNote(id, direction) {
      const index = notes.findIndex(n => n.id === id);
      if (index < 0) return;
      const target = direction === 'up' ? index - 1 : index + 1;
      if (target < 0 || target >= notes.length) return;
      [notes[index], notes[target]] = [notes[target], notes[index]];
      renderNotes();
    }

    async function copyNote(id, button) {
      const note = notes.find(n => n.id === id);
      if (!note) return;
      try {
        await navigator.clipboard.writeText(note.content);
      } catch {
        const temp = document.createElement('textarea');
        temp.value = note.content;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        temp.remove();
      }
      if (button) {
        button.classList.add('copied');
        window.setTimeout(() => button.classList.remove('copied'), 700);
      }
    }

    function deleteNote(id) {
      notes = notes.filter(n => n.id !== id);
      renderNotes();
    }

    function updateNote(id, value) {
      const note = notes.find(n => n.id === id);
      if (!note) return;
      note.content = value;
    }

    notesContainer.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const { action, id } = button.dataset;

      if (action === 'up') moveNote(id, 'up');
      if (action === 'down') moveNote(id, 'down');
      if (action === 'copy') copyNote(id, button);
      if (action === 'delete') deleteNote(id);
    });

    notesContainer.addEventListener('input', (event) => {
      const editor = event.target.closest('[data-editor-id]');
      if (!editor) return;
      updateNote(editor.dataset.editorId, editor.innerText);
    });

    function renderPaletteAnchors() {
      paletteNav.innerHTML = noteColors.map((color, index) => (
        `<button class="palette-dot" style="background:${color.header}" data-color-anchor="${index}" aria-label="Ir a notas del color ${index + 1}"></button>`
      )).join('');
    }

    paletteNav.addEventListener('click', (event) => {
      const dot = event.target.closest('[data-color-anchor]');
      if (!dot) return;
      const colorIndex = Number(dot.dataset.colorAnchor);
      const targetNote = notesContainer.querySelector(`.note[data-color-index="${colorIndex}"]`);
      if (targetNote) {
        targetNote.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });

    function renderNotes() {
      const term = searchInput.value.trim().toLowerCase();
      const filtered = term
        ? notes.filter(note => (`${note.title}\n${note.content}`).toLowerCase().includes(term))
        : notes;

      if (!filtered.length) {
        notesContainer.innerHTML = `<div class="empty">No hay notas que coincidan con la búsqueda.</div>`;
        return;
      }

      notesContainer.innerHTML = filtered.map((note) => {
        const color = noteColors[note.colorIndex % noteColors.length];
        return `
          <article class="note" id="note-${note.id}" data-color-index="${note.colorIndex}" style="background:${color.body}">
            <header class="note-header" style="background:${color.header}">
              <span>${escapeHtml(note.title)}</span>
              <div>
                <button class="small copy-btn" data-action="copy" data-id="${note.id}" aria-label="Copiar contenido">📋</button>
                <button class="small danger" data-action="delete" data-id="${note.id}" aria-label="Borrar">✖</button>
              </div>
            </header>
            <div class="note-body-wrap">
              <div class="note-body" contenteditable="true" data-editor-id="${note.id}">${escapeHtml(note.content)}</div>
              <div class="side-actions">
                <button class="small move" data-action="up" data-id="${note.id}" aria-label="Subir">⬆</button>
                <button class="small move" data-action="down" data-id="${note.id}" aria-label="Bajar">⬇</button>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    renderPaletteAnchors();
    renderNotes();
  </script>
</body>
</html>
